name: Release

on:
  push:
    branches: [main]
    paths:
      - manifest.json
      - .release/latest/*.md
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to re-release (e.g. v1.0.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from manifest
        id: version
        run: echo "tag=v$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_exists
        run: |
          if git ls-remote --tags origin "${{ steps.version.outputs.tag }}" 2>/dev/null | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Firefox release zip
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          jq '. + {"browser_specific_settings":{"gecko":{"id":"tissues@castled.codes","strict_min_version":"109.0"}}}' \
            manifest.json > /tmp/manifest-firefox.json
          cp manifest.json /tmp/manifest-chrome.json
          cp /tmp/manifest-firefox.json manifest.json
          zip -r tissues-firefox.zip . -x '.git/*' '.github/*' 'generate-icons.py' '.gitignore'
          cp /tmp/manifest-chrome.json manifest.json

      - name: Create Chrome release zip
        if: steps.tag_exists.outputs.exists == 'false'
        run: |
          zip -r tissues-chrome.zip . -x '.git/*' '.github/*' 'generate-icons.py' '.gitignore'

      - name: Read release notes
        id: release_notes
        run: |
          NOTES_FILE=".release/latest/${{ steps.version.outputs.tag }}.md"
          if [ -f "$NOTES_FILE" ]; then
            CONTENT=$(cat "$NOTES_FILE")
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONTENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ steps.version.outputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: steps.tag_exists.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Tissues ${{ steps.version.outputs.tag }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            tissues-chrome.zip
            tissues-firefox.zip

      - name: Update existing release notes
        if: steps.tag_exists.outputs.exists == 'true' && steps.release_notes.outputs.has_notes == 'true'
        run: |
          gh release edit "${{ steps.version.outputs.tag }}" \
            --notes-file ".release/latest/${{ steps.version.outputs.tag }}.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rerelease:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete old release assets
        run: |
          gh release delete-asset "${{ inputs.version }}" tissues-chrome.zip || true
          gh release delete-asset "${{ inputs.version }}" tissues-firefox.zip || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Firefox release zip
        run: |
          jq '. + {"browser_specific_settings":{"gecko":{"id":"tissues@castled.codes","strict_min_version":"109.0"}}}' \
            manifest.json > /tmp/manifest-firefox.json
          cp manifest.json /tmp/manifest-chrome.json
          cp /tmp/manifest-firefox.json manifest.json
          zip -r tissues-firefox.zip . -x '.git/*' '.github/*' 'generate-icons.py' '.gitignore'
          cp /tmp/manifest-chrome.json manifest.json

      - name: Create Chrome release zip
        run: |
          zip -r tissues-chrome.zip . -x '.git/*' '.github/*' 'generate-icons.py' '.gitignore'

      - name: Read release notes
        id: release_notes
        run: |
          NOTES_FILE=".release/latest/${{ inputs.version }}.md"
          if [ -f "$NOTES_FILE" ]; then
            CONTENT=$(cat "$NOTES_FILE")
            echo "body<<EOF" >> "$GITHUB_OUTPUT"
            echo "$CONTENT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "body=Release ${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          body: ${{ steps.release_notes.outputs.body }}
          files: |
            tissues-chrome.zip
            tissues-firefox.zip
