<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tissues</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 300px; padding: 12px; }
    h2 { font-size: 14px; margin: 0 0 10px; }
    #list { list-style: none; padding: 0; margin: 0 0 12px; font-size: 13px; }
    #list li { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #eee; }
    #list li:last-child { border-bottom: none; }
    .state { font-size: 16px; }
    button { font-size: 12px; padding: 4px 10px; cursor: pointer; }
    #empty { font-size: 13px; color: #666; }
  </style>
</head>
<body>
  <h2>Tissues</h2>
  <ul id="list"></ul>
  <p id="empty" style="display:none">No tissues tracked yet.</p>
  <button id="clear">Clear all tissues</button>
  <script src="popup.js"></script>
</body>
</html>
